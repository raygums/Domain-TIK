name: Production CI/CD Pipeline

on:
  push:
    branches:
      - production

jobs:
  ci-testing:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath
          coverage: none

      # --- PERBAIKAN 1: Menyiapkan Lingkungan Node.js & Membangun Aset Vite ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Menggunakan versi LTS stabil

      - name: Install Dependencies & Build Vite Assets
        run: |
          npm ci
          npm run build
      # ------------------------------------------------------------------------

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Prepare Test Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit Tests
        run: php artisan test

  cd-deployment:
    name: Continuous Deployment
    needs: ci-testing
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/SiDevTIK
            
            # 1. Selaraskan repository GitHub ke VPS Host
            git fetch origin production
            git reset --hard origin/production
            
            # --- PERBAIKAN 2: Eksekusi perintah di DALAM Docker Container ---
            
            # 2. Update dependensi PHP via container
            docker exec si-project-tik-app composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # 3. Reset Cache Laravel via container
            docker exec si-project-tik-app php artisan optimize:clear
            docker exec si-project-tik-app php artisan config:cache
            docker exec si-project-tik-app php artisan route:cache
            docker exec si-project-tik-app php artisan view:cache
            
            # 4. Jalankan Migrasi Database via container
            docker exec si-project-tik-app php artisan migrate --force
